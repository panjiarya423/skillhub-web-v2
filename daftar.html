<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillHub - Registrasi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand premium-logo" href="index.html"> Skill<span class="hub-text">Hub</span><span class="hub-dot">.</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="katalog.html">Program</a></li>
                    <li class="nav-item"><a class="nav-link" href="jadwal.html">Jadwal</a></li>
                    <li class="nav-item"><a class="nav-link active" href="daftar.html">Daftar</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <div class="row">
            <div class="col-lg-6 mx-auto">
                <div class="card p-4 p-md-5 border-0 shadow-sm rounded-4">
                    <h3 class="fw-bold text-center mb-2">Formulir Pendaftaran</h3>
                    <p class="text-muted text-center mb-4 style-sub">Lengkapi data untuk mengamankan sertifikat dan slot belajar Anda</p>
                    
                    <div id="alertBox"></div>

                    <form id="registrationForm">
                        <div class="mb-3">
                            <label for="fullName" class="form-label fw-semibold">Nama Lengkap</label>
                            <input type="text" class="form-control" id="fullName" placeholder="Masukkan nama lengkap sesuai KTP">
                        </div>
                        <div class="mb-3">
                            <label for="userEmail" class="form-label fw-semibold">Alamat Email</label>
                            <input type="email" class="form-control" id="userEmail" placeholder="contoh@email.com">
                        </div>
                        <div class="mb-3">
                            <label for="userPhone" class="form-label fw-semibold">Nomor WhatsApp</label>
                            <input type="text" class="form-control" id="userPhone" placeholder="08xxxxxxxxxx">
                        </div>
                        <div class="mb-4">
                            <label for="programSelect" class="form-label fw-semibold">Pilih Program Kelas</label>
                            <select class="form-select" id="programSelect">
                                <option value="" selected disabled>-- Pilih Salah Satu --</option>
                                <option value="data">Data Analyst Comprehensive Bootcamp</option>
                                <option value="excel">Microsoft Excel Advanced Masterclass</option>
                            </select>
                        </div>

                        <div class="alert text-center py-3 mb-4 fw-medium" id="priceDisplay">
                            Total Investasi: <strong class="text-primary">Rp 0</strong>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 btn-lg shadow-sm">Submit Pendaftaran</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <p class="mb-0 text-white-50">&copy; 2026 SkillHub. All Rights Reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
